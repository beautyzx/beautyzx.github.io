<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>星核殘響 — 文字冒險 RPG · 序章</title>
<meta name="description" content="一場關於星球、邪念與轉生的文字冒險。序章：星髓之流。" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0b1116;
    --panel: rgba(16, 26, 32, 0.82);
    --line: rgba(122, 224, 178, 0.16);
    --mako: #7ae0b2;
    --mako-dim: #4d8f74;
    --gold: #d8b56c;
    --rose: #c98a93;
    --text: #cfd8d4;
    --muted: #7d8a85;
    --evil: #b08ad6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font-family: 'Noto Serif TC', Georgia, serif;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(122, 224, 178, 0.10), transparent 55%),
      radial-gradient(ellipse at 85% 110%, rgba(176, 138, 214, 0.08), transparent 50%),
      linear-gradient(160deg, #0b1116 0%, #0d141c 55%, #101820 100%);
    background-attachment: fixed;
    line-height: 1.9;
  }
  /* 微弱星塵 */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(122,224,178,.5), transparent 1px),
      radial-gradient(1px 1px at 78% 14%, rgba(216,181,108,.4), transparent 1px),
      radial-gradient(1.5px 1.5px at 62% 68%, rgba(122,224,178,.35), transparent 2px),
      radial-gradient(1px 1px at 30% 84%, rgba(207,216,212,.3), transparent 1px),
      radial-gradient(1px 1px at 90% 55%, rgba(176,138,214,.35), transparent 1px);
    opacity: .7;
  }
  .wrap {
    position: relative; z-index: 1;
    max-width: 980px; margin: 0 auto;
    padding: 28px 22px 60px;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
  }
  .back-link {
    color: var(--mako-dim); text-decoration: none; font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif; letter-spacing: .12em;
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 16px;
    transition: all .25s;
  }
  .back-link:hover { color: var(--mako); border-color: rgba(122,224,178,.4); }
  .game-title {
    font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
    font-style: italic; color: var(--muted); font-size: 14px; letter-spacing: .2em;
  }

  /* ===== 主面板配置 ===== */
  .layout { display: grid; grid-template-columns: minmax(0,1fr) 250px; gap: 18px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .stage { padding: 34px 38px 28px; min-height: 520px; display: flex; flex-direction: column; }

  /* ===== 文字記錄 ===== */
  #log { flex: 1; }
  .scene-title {
    font-family: 'Noto Serif TC', serif; font-weight: 600;
    color: var(--gold); font-size: 15px; letter-spacing: .35em;
    margin: 26px 0 10px; text-align: center;
  }
  .scene-title::before, .scene-title::after { content: "✦"; color: rgba(216,181,108,.45); margin: 0 14px; font-size: 11px; }
  .para {
    margin: 0 0 16px; font-size: 15.5px; color: var(--text);
    animation: fadein .8s ease both;
  }
  .para.speech { color: #e8e3d5; }
  .para.system {
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px;
    color: var(--mako); letter-spacing: .06em;
    border-left: 2px solid rgba(122,224,178,.45);
    padding: 4px 14px; background: rgba(122,224,178,.05);
    border-radius: 0 8px 8px 0;
  }
  .para.evil { color: var(--evil); text-shadow: 0 0 14px rgba(176,138,214,.3); }
  .para.roll {
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px; letter-spacing: .05em;
    text-align: center; padding: 10px; border-radius: 12px;
    border: 1px dashed rgba(216,181,108,.35); color: var(--gold);
    background: rgba(216,181,108,.05);
  }
  .para.roll.fail { border-color: rgba(201,138,147,.4); color: var(--rose); background: rgba(201,138,147,.05); }
  .para.battle {
    font-family: 'Noto Sans TC', sans-serif; font-size: 13.5px;
    color: #d6c6b2; padding-left: 14px;
  }
  .choice-echo {
    text-align: right; color: var(--mako-dim); font-size: 13.5px;
    font-family: 'Noto Sans TC', sans-serif; margin: 4px 0 18px;
    font-style: italic;
  }
  .choice-echo::before { content: "▸ "; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ===== 選項 ===== */
  #choices { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    text-align: left; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
    color: var(--text); line-height: 1.6;
    background: rgba(122,224,178,.04);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 18px; transition: all .22s ease;
    animation: fadein .6s ease both;
  }
  .choice-btn:hover {
    border-color: rgba(122,224,178,.5); background: rgba(122,224,178,.10);
    transform: translateX(6px); color: #eef5f1;
  }
  .choice-btn .tag {
    display: inline-block; font-size: 11px; letter-spacing: .1em;
    color: var(--gold); border: 1px solid rgba(216,181,108,.35);
    border-radius: 999px; padding: 0 9px; margin-right: 9px;
  }
  .choice-btn.evil { border-color: rgba(176,138,214,.3); }
  .choice-btn.evil:hover { border-color: rgba(176,138,214,.7); background: rgba(176,138,214,.10); }
  .choice-btn.evil .tag { color: var(--evil); border-color: rgba(176,138,214,.4); }

  /* ===== 側欄：角色狀態 ===== */
  .sidebar { padding: 24px 22px; align-self: start; position: sticky; top: 20px; }
  .sidebar h3 {
    margin: 0 0 4px; font-size: 12px; letter-spacing: .3em;
    color: var(--mako-dim); font-family: 'Noto Sans TC', sans-serif; font-weight: 400;
  }
  #char-name {
    font-family: 'Noto Serif TC', serif; font-size: 21px; font-weight: 600;
    color: #eef5f1; margin: 0 0 2px;
  }
  #char-origin { font-size: 12px; color: var(--gold); letter-spacing: .15em; font-family: 'Noto Sans TC', sans-serif; margin-bottom: 16px; }
  .bar-label {
    display: flex; justify-content: space-between;
    font-size: 11px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--muted); letter-spacing: .1em; margin-bottom: 3px;
  }
  .bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,.06); overflow: hidden; margin-bottom: 12px; }
  .bar > i { display: block; height: 100%; border-radius: 99px; transition: width .6s ease; }
  #hp-fill { background: linear-gradient(90deg, #6fae8b, var(--mako)); }
  #mp-fill { background: linear-gradient(90deg, #7d6aa8, var(--evil)); }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 7px;
    margin: 16px 0; font-family: 'Noto Sans TC', sans-serif;
  }
  .stat-cell {
    border: 1px solid var(--line); border-radius: 10px;
    padding: 6px 10px; font-size: 12px; color: var(--muted);
    display: flex; justify-content: space-between;
  }
  .stat-cell b { color: #eef5f1; font-weight: 500; }
  .skill-list { font-family: 'Noto Sans TC', sans-serif; font-size: 12.5px; }
  .skill-item {
    border-left: 2px solid rgba(216,181,108,.4);
    padding: 3px 10px; margin-bottom: 7px; color: #d6c6b2;
    background: rgba(216,181,108,.04); border-radius: 0 8px 8px 0;
  }
  .side-divider { border: none; border-top: 1px solid var(--line); margin: 16px 0; }
  .restart-btn {
    width: 100%; margin-top: 6px; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; letter-spacing: .15em;
    color: var(--muted); background: none;
    border: 1px solid var(--line); border-radius: 10px; padding: 8px;
    transition: all .2s;
  }
  .restart-btn:hover { color: var(--rose); border-color: rgba(201,138,147,.4); }

  /* ===== 標題畫面 / 建角 ===== */
  .title-screen { text-align: center; padding: 70px 30px 50px; }
  .title-eyebrow { font-size: 12px; letter-spacing: .5em; color: var(--mako-dim); font-family: 'Noto Sans TC', sans-serif; margin-bottom: 22px; }
  .big-title {
    font-family: 'Noto Serif TC', serif; font-weight: 700;
    font-size: clamp(42px, 8vw, 68px); letter-spacing: .18em;
    margin: 0 0 6px; color: #eef5f1;
    text-shadow: 0 0 40px rgba(122,224,178,.25);
  }
  .sub-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--muted); font-size: 17px; letter-spacing: .1em; margin-bottom: 40px;
  }
  .title-quote { max-width: 420px; margin: 0 auto 44px; color: var(--muted); font-size: 14px; }
  .start-btn {
    cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px; letter-spacing: .35em; color: var(--mako);
    background: rgba(122,224,178,.06); border: 1px solid rgba(122,224,178,.4);
    border-radius: 999px; padding: 13px 52px; margin: 0 8px 10px;
    transition: all .3s;
  }
  .start-btn:hover { background: rgba(122,224,178,.16); box-shadow: 0 0 30px rgba(122,224,178,.2); }
  .start-btn.secondary { color: var(--muted); border-color: var(--line); }
  .start-btn.secondary:hover { color: var(--gold); border-color: rgba(216,181,108,.4); box-shadow: none; }

  .creation h2 {
    text-align: center; font-weight: 600; letter-spacing: .3em;
    color: #eef5f1; font-size: 20px; margin: 8px 0 26px;
  }
  .name-row { text-align: center; margin-bottom: 30px; }
  .name-input {
    font-family: 'Noto Serif TC', serif; font-size: 18px; text-align: center;
    color: #eef5f1; background: rgba(255,255,255,.04);
    border: none; border-bottom: 1px solid rgba(122,224,178,.4);
    padding: 8px 18px; width: 250px; letter-spacing: .1em;
  }
  .name-input:focus { outline: none; border-bottom-color: var(--mako); }
  .name-hint { font-size: 12px; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; margin-top: 8px; letter-spacing: .1em; }
  .origin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr)); gap: 14px; }
  .origin-card {
    cursor: pointer; text-align: left;
    border: 1px solid var(--line); border-radius: 16px;
    background: rgba(255,255,255,.025); padding: 18px;
    transition: all .25s ease; color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
  }
  .origin-card:hover { transform: translateY(-4px); border-color: rgba(216,181,108,.5); background: rgba(216,181,108,.05); }
  .origin-card.evil-card:hover { border-color: rgba(176,138,214,.6); background: rgba(176,138,214,.07); box-shadow: 0 0 30px rgba(176,138,214,.12); }
  .origin-card h4 { margin: 0 0 2px; font-size: 17px; color: #eef5f1; font-family: 'Noto Serif TC', serif; letter-spacing: .1em; }
  .origin-sub { font-size: 11px; letter-spacing: .15em; color: var(--gold); margin-bottom: 10px; }
  .evil-card .origin-sub { color: var(--evil); }
  .origin-desc { font-size: 12.5px; color: var(--muted); line-height: 1.75; margin-bottom: 12px; min-height: 66px; }
  .origin-stats { font-size: 11px; color: var(--mako-dim); letter-spacing: .05em; }

  /* ===== 擲骰動畫 ===== */
  #dice-overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    align-items: center; justify-content: center;
    background: rgba(5, 9, 12, 0.72); backdrop-filter: blur(4px);
  }
  #dice-overlay.show { display: flex; }
  .dice-box { text-align: center; }
  .dice-check-name { font-family: 'Noto Sans TC', sans-serif; letter-spacing: .3em; color: var(--gold); font-size: 14px; margin-bottom: 24px; }
  .d20 {
    width: 130px; height: 130px; margin: 0 auto 22px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .d20 svg { position: absolute; inset: 0; filter: drop-shadow(0 0 24px rgba(122,224,178,.35)); }
  .d20.rolling svg { animation: spin .55s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .d20-num {
    position: relative; z-index: 2;
    font-family: 'Cormorant Garamond', serif; font-size: 46px; font-weight: 500;
    color: #eef5f1;
  }
  .dice-result { font-family: 'Noto Sans TC', sans-serif; font-size: 15px; color: var(--text); min-height: 56px; letter-spacing: .08em; }
  .dice-result .ok { color: var(--mako); font-size: 21px; letter-spacing: .4em; display: block; margin-top: 6px; }
  .dice-result .ng { color: var(--rose); font-size: 21px; letter-spacing: .4em; display: block; margin-top: 6px; }

  /* ===== 敵人血條 ===== */
  #enemy-box {
    display: none; margin: 8px 0 16px; padding: 14px 18px;
    border: 1px solid rgba(201,138,147,.3); border-radius: 14px;
    background: rgba(201,138,147,.05);
    font-family: 'Noto Sans TC', sans-serif;
  }
  #enemy-box .bar-label { color: var(--rose); }
  #enemy-fill { background: linear-gradient(90deg, #8a4a55, var(--rose)); }

  .end-card {
    text-align: center; margin: 40px 0 10px; padding: 36px 20px;
    border: 1px solid rgba(216,181,108,.3); border-radius: 18px;
    background: rgba(216,181,108,.04); animation: fadein 1.4s ease both;
  }
  .end-card .zh { font-size: 26px; letter-spacing: .6em; color: var(--gold); font-weight: 600; }
  .end-card .en { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); margin-top: 10px; }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; order: -1; }
    .stage { padding: 24px 20px; min-height: 0; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .skill-list { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back-link" href="/">← 回花園</a>
    <div class="game-title">Echoes of the Starcore · 序章</div>
  </div>

  <!-- 標題畫面 -->
  <div class="panel title-screen" id="screen-title">
    <div class="title-eyebrow">TEXT ADVENTURE RPG</div>
    <h1 class="big-title">星核殘響</h1>
    <div class="sub-title">Echoes of the Starcore — Prologue</div>
    <p class="title-quote">星球的血液被抽進鋼鐵的城市，<br>而在星髓之流的最深處，有什麼東西睜開了眼睛。<br>那也許是你。也許，是你心裡的邪念。</p>
    <div>
      <button class="start-btn" id="btn-new">開始旅程</button>
      <button class="start-btn secondary" id="btn-continue" style="display:none;">繼續上次</button>
    </div>
  </div>

  <!-- 建立角色 -->
  <div class="panel title-screen creation" id="screen-create" style="display:none;">
    <div class="title-eyebrow">CHARACTER CREATION</div>
    <h2>你曾經，是什麼樣的人？</h2>
    <div class="name-row">
      <input class="name-input" id="name-input" maxlength="10" placeholder="輸入你的名字" />
      <div class="name-hint">— 這個名字，將在轉生之後被遺忘，又被重新記起 —</div>
    </div>
    <div class="origin-grid" id="origin-grid"></div>
  </div>

  <!-- 遊戲主畫面 -->
  <div class="layout" id="screen-game" style="display:none;">
    <div class="panel stage">
      <div id="enemy-box">
        <div class="bar-label"><span id="enemy-name">敵人</span><span id="enemy-hp-text"></span></div>
        <div class="bar"><i id="enemy-fill" style="width:100%"></i></div>
      </div>
      <div id="log"></div>
      <div id="choices"></div>
    </div>
    <div class="panel sidebar">
      <h3>WANDERER</h3>
      <div id="char-name">—</div>
      <div id="char-origin">—</div>
      <div class="bar-label"><span>HP 生命</span><span id="hp-text"></span></div>
      <div class="bar"><i id="hp-fill" style="width:100%"></i></div>
      <div class="bar-label"><span>MP 魔素</span><span id="mp-text"></span></div>
      <div class="bar"><i id="mp-fill" style="width:100%"></i></div>
      <div class="stats-grid">
        <div class="stat-cell">力量 <b id="st-str">0</b></div>
        <div class="stat-cell">敏捷 <b id="st-agi">0</b></div>
        <div class="stat-cell">智力 <b id="st-int">0</b></div>
        <div class="stat-cell">魅力 <b id="st-cha">0</b></div>
      </div>
      <h3>SKILLS</h3>
      <div class="skill-list" id="skill-list"></div>
      <hr class="side-divider" />
      <button class="restart-btn" id="btn-restart">⟲ 重新開始序章</button>
    </div>
  </div>
</div>

<!-- 擲骰 -->
<div id="dice-overlay">
  <div class="dice-box">
    <div class="dice-check-name" id="dice-name">檢定</div>
    <div class="d20" id="d20">
      <svg viewBox="0 0 100 100"><polygon points="50,4 93,28 93,72 50,96 7,72 7,28" fill="rgba(122,224,178,.07)" stroke="#7ae0b2" stroke-width="1.4"/><polygon points="50,18 80,34 80,66 50,82 20,66 20,34" fill="none" stroke="rgba(122,224,178,.4)" stroke-width="0.8"/></svg>
      <div class="d20-num" id="d20-num">20</div>
    </div>
    <div class="dice-result" id="dice-result"></div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   星核殘響 — 序章引擎
   萬王之王式文字介面 × BG3 擲骰與職業 × 轉生史萊姆 × FF7 風格故事
   ============================================================ */

const SAVE_KEY = 'starcore-echoes-save-v1';

const ORIGINS = {
  evil: {
    name: '邪念', sub: 'THE MALICE · 深淵殘念',
    desc: '你不是「人」。你是寄宿在某個人心底的一縷邪念——嫉妒、飢渴、想吞掉全世界的衝動。宿主死去的那一夜，你終於自由了。',
    stats: { str: 2, agi: 2, int: 4, cha: 4 }, hp: 26, mp: 16,
    skills: [
      { id: 'whisper', name: '蝕心低語', desc: '以言語侵蝕心靈（戰鬥：智力傷害／劇情：支配選項）', cost: 4 },
    ],
    evil: true,
  },
  knight: {
    name: '劍士', sub: 'THE BLADE · 餘燼傭兵',
    desc: '曾是星髓巨企「神籠」的親衛劍士，親眼看見星球被抽乾後叛逃。你的劍很重，因為上面掛著舊日的罪。',
    stats: { str: 5, agi: 3, int: 1, cha: 2 }, hp: 34, mp: 8,
    skills: [{ id: 'cleave', name: '烈空斬', desc: '灌注鬥氣的一閃（戰鬥：力量重擊）', cost: 4 }],
  },
  mage: {
    name: '魔導士', sub: 'THE ARCANIST · 星髓學者',
    desc: '研究星髓能量的學者，發現了「星核」的祕密之後被通緝。你相信知識能救星球——也知道知識會殺人。',
    stats: { str: 1, agi: 2, int: 5, cha: 3 }, hp: 24, mp: 20,
    skills: [{ id: 'starfire', name: '星炎彈', desc: '壓縮星髓的火團（戰鬥：智力爆發傷害）', cost: 5 }],
  },
  rogue: {
    name: '盜賊', sub: 'THE SHADOW · 下城之影',
    desc: '在鋼鐵都市的下水道長大，靠偷神籠的物資活到今天。世界沒給過你什麼，所以你打算自己拿。',
    stats: { str: 2, agi: 5, int: 3, cha: 2 }, hp: 28, mp: 10,
    skills: [{ id: 'ambush', name: '影襲', desc: '自陰影中的奇襲（戰鬥：敏捷連擊）', cost: 3 }],
  },
};

let G = null; // 遊戲狀態

function newState(name, originKey) {
  const o = ORIGINS[originKey];
  return {
    name, origin: originKey,
    stats: { ...o.stats },
    hp: o.hp, maxHp: o.hp,
    mp: o.mp, maxMp: o.mp,
    skills: o.skills.map(s => ({ ...s })),
    flags: {},
    scene: 'p1',
    log: [],
  };
}

/* ---------- 共用 ---------- */
const $ = id => document.getElementById(id);
const isEvil = () => G && G.origin === 'evil';
const mod = stat => Math.floor((G.stats[stat] - 1) / 2) + (G.stats[stat] >= 4 ? 1 : 0);

function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(G)); } catch (e) {} }
function load() { try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) { return null; } }

function addSkill(skill) {
  if (!G.skills.some(s => s.id === skill.id)) G.skills.push(skill);
  renderSide();
}

/* ---------- 畫面輸出 ---------- */
function pushLog(html, cls) {
  G.log.push({ html, cls });
  appendPara(html, cls);
}
function appendPara(html, cls) {
  const log = $('log');
  const p = document.createElement('div');
  p.className = 'para' + (cls ? ' ' + cls : '');
  p.innerHTML = html;
  log.appendChild(p);
  p.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function pushTitle(t) { pushLog(t, 'is-title'); const el = $('log').lastChild; el.className = 'scene-title'; }
function pushEcho(text) {
  G.log.push({ html: text, cls: 'is-echo' });
  const log = $('log');
  const p = document.createElement('div');
  p.className = 'choice-echo';
  p.textContent = text;
  log.appendChild(p);
}

function renderSide() {
  $('char-name').textContent = G.name;
  $('char-origin').textContent = ORIGINS[G.origin].sub + (G.flags.slime ? ' · 史萊姆' : '');
  $('hp-text').textContent = G.hp + ' / ' + G.maxHp;
  $('mp-text').textContent = G.mp + ' / ' + G.maxMp;
  $('hp-fill').style.width = Math.max(0, G.hp / G.maxHp * 100) + '%';
  $('mp-fill').style.width = Math.max(0, G.mp / G.maxMp * 100) + '%';
  $('st-str').textContent = G.stats.str;
  $('st-agi').textContent = G.stats.agi;
  $('st-int').textContent = G.stats.int;
  $('st-cha').textContent = G.stats.cha;
  $('skill-list').innerHTML = G.skills.map(s =>
    '<div class="skill-item">【' + s.name + '】' + (s.cost ? ' <span style="color:#7d8a85">MP' + s.cost + '</span><br>' : '<br>') + '<span style="color:#7d8a85">' + s.desc + '</span></div>'
  ).join('');
}

function setChoices(list) {
  const box = $('choices');
  box.innerHTML = '';
  list.forEach((c, i) => {
    if (c.hidden && c.hidden()) return;
    const b = document.createElement('button');
    b.className = 'choice-btn' + (c.evil ? ' evil' : '');
    b.style.animationDelay = (i * 0.12) + 's';
    b.innerHTML = (c.tag ? '<span class="tag">' + c.tag + '</span>' : '') + c.text;
    b.onclick = () => { box.innerHTML = ''; pushEcho(c.text.replace(/<[^>]+>/g, '')); c.fn(); };
    box.appendChild(b);
  });
}

/* ---------- 擲骰（BG3 風格 d20 檢定） ---------- */
function rollCheck(label, stat, dc, onPass, onFail) {
  const bonus = mod(stat);
  const overlay = $('dice-overlay');
  const numEl = $('d20-num');
  const resEl = $('dice-result');
  $('dice-name').textContent = label + ' · 難度 ' + dc;
  resEl.innerHTML = '';
  overlay.classList.add('show');
  $('d20').classList.add('rolling');

  let ticks = 0;
  const spin = setInterval(() => {
    numEl.textContent = 1 + Math.floor(Math.random() * 20);
    if (++ticks >= 14) {
      clearInterval(spin);
      $('d20').classList.remove('rolling');
      const die = 1 + Math.floor(Math.random() * 20);
      const total = die + bonus;
      const pass = die === 20 || (die !== 1 && total >= dc);
      numEl.textContent = die;
      resEl.innerHTML = '🎲 ' + die + (bonus ? ' + ' + bonus : '') + ' = ' + total +
        (die === 20 ? '（大成功！）' : die === 1 ? '（大失敗…）' : '') +
        (pass ? '<span class="ok">檢 定 成 功</span>' : '<span class="ng">檢 定 失 敗</span>');
      setTimeout(() => {
        overlay.classList.remove('show');
        pushLog('🎲 ' + label + '檢定 DC' + dc + ' — 擲出 ' + die + (bonus ? '+' + bonus : '') + ' = ' + total + (pass ? '，成功' : '，失敗'), 'roll' + (pass ? '' : ' fail'));
        (pass ? onPass : onFail)();
      }, 1300);
    }
  }, 70);
}

/* ---------- 簡易戰鬥 ---------- */
let battle = null;
function startBattle(enemy, onWin) {
  battle = { e: { ...enemy }, onWin };
  $('enemy-box').style.display = 'block';
  $('enemy-name').textContent = enemy.name;
  updateEnemyBar();
  pushLog('—— 戰鬥開始：' + enemy.name + ' ——', 'system');
  battleTurn();
}
function updateEnemyBar() {
  $('enemy-hp-text').textContent = Math.max(0, battle.e.hp) + ' / ' + battle.e.maxHp;
  $('enemy-fill').style.width = Math.max(0, battle.e.hp / battle.e.maxHp * 100) + '%';
}
function battleTurn() {
  const opts = [{
    tag: '攻擊', text: '普通攻擊',
    fn: () => playerHit(3 + Math.floor(Math.random() * 4) + Math.max(mod('str'), mod('agi')), '你發起攻擊'),
  }];
  G.skills.forEach(s => {
    if (!s.cost) return;
    opts.push({
      tag: 'MP' + s.cost, text: '技能 ·【' + s.name + '】', evil: s.id === 'whisper',
      fn: () => {
        if (G.mp < s.cost) { appendPara('魔素不足……低語在喉嚨裡散掉了。', 'battle'); return battleTurn(); }
        G.mp -= s.cost; renderSide();
        const dmgMap = { whisper: 6 + mod('int') * 2, cleave: 7 + mod('str') * 2, starfire: 8 + mod('int') * 2, ambush: 5 + mod('agi') * 3, devour: 7 + mod('int') + mod('cha') };
        playerHit(dmgMap[s.id] + Math.floor(Math.random() * 4), '你施展【' + s.name + '】');
      },
    });
  });
  if (G.flags.predator) {
    opts.push({
      tag: '固有', text: '【捕食】試圖吞噬對手', evil: isEvil(),
      fn: () => {
        if (battle.e.hp <= battle.e.maxHp * 0.4) {
          pushLog('你的身體張開成一張無聲的口。' + battle.e.name + '連慘叫都來不及，便被整個吞入體內，化為解析中的資訊之流。', isEvil() ? 'evil' : 'battle');
          battle.e.hp = 0; updateEnemyBar();
          return endBattle(true);
        }
        appendPara('對方還太活躍，黏體抓不住它——【捕食】失敗，趁隙挨了一記！', 'battle');
        enemyHit();
      },
    });
  }
  setChoices(opts);
}
function playerHit(dmg, prefix) {
  battle.e.hp -= dmg; updateEnemyBar();
  appendPara(prefix + '，造成 <b style="color:#d8b56c">' + dmg + '</b> 點傷害。', 'battle');
  if (battle.e.hp <= 0) return endBattle(true);
  enemyHit();
}
function enemyHit() {
  const dmg = Math.max(1, battle.e.atk + Math.floor(Math.random() * 3) - 1);
  G.hp = Math.max(1, G.hp - dmg); // 序章不死
  renderSide();
  appendPara(battle.e.name + ' 反擊，你受到 <b style="color:#c98a93">' + dmg + '</b> 點傷害。', 'battle');
  setTimeout(battleTurn, 250);
}
function endBattle(win) {
  $('enemy-box').style.display = 'none';
  pushLog('—— 戰鬥結束 ——', 'system');
  const cb = battle.onWin; battle = null;
  if (win && cb) cb();
}

        fn: () => { G.flags.dragonDeal = true; pushLog('洞窟安靜了整整十秒。然後龍緩緩壓低了頭顱，金瞳貼近封印，第一次認真地「看」你。', 'evil'); pushLog('「……你這傢伙，不是普通的轉生者。那股味道——是『深淵』那邊的東西吧。」它咧開滿口雷光的長牙，「好啊。本座就聽聽，一坨邪念能開出什麼價碼。」', 'speech'); go('p7'); } },
      ] : []),
    ]);
  },

  p7() {
    pushLog('你和龍聊了很久。久到忘記時間——反正史萊姆不會累。');
    pushLog('維爾汎告訴你：這裡是「封龍峽谷」最深處，米德加雅以北三百里。星球把過剩的力量封印於此，而神籠這幾年一直在峽谷外圍鑽探——他們想把龍當成新的能源。');
    pushLog('「星髓爐炸了一座？」龍哼了一聲，「那只是開始。星球的忍耐是有限度的。小東西，你在流裡聽見的那些聲音，遲早會變成怒吼。」', 'speech');
    if (G.flags.dragonDeal) {
      pushLog('「至於交易——」龍的聲音壓得很低，「替本座撕開這道封印。作為代價，本座的力量、本座的名號，隨你取用。」', 'speech');
      pushLog('你還沒有答應。但你們都知道，這個約定已經在黑暗裡生了根。', 'evil');
    } else if (G.flags.dragonFriend) {
      pushLog('「喂，小東西。」龍忽然說，「陪本座解了三百年來第一次悶。按古龍的規矩，得回個禮——本座將名予你。」', 'speech');
    }
    pushLog('「從今往後，你就叫——<b>' + G.name + '·泰恩</b>。『泰恩』，是風暴眷顧之意。」', 'speech');
    pushLog('《通知。獲得「名字」。魔素容量擴張。》', 'system');
    G.maxMp += 8; G.mp = G.maxMp; G.maxHp += 4; G.hp = G.maxHp;
    renderSide();
    pushLog('名字落在身上的瞬間，全身的魔素沸騰了。原來「被命名」是這種感覺——像有人在你的存在上，輕輕蓋了一個「你可以活下去」的印章。');
    setChoices([
      { tag: '繼續', text: '「維爾汎，我去外面看看。總得先搞清楚這個身體能做什麼。」', fn: () => go('p8') },
    ]);
  },

  p8() {
    pushLog('離開龍之牢籠，你沿著魔素的氣流往洞窟淺層移動。半路上，「視野」裡浮現出一堆白骨——某個冒險者的遺骸，旁邊散落著一個皮袋、一把鏽劍，和幾株在屍骸養分上長出的回復藥草。');
    pushLog('《檢測到可解析物質。提案：使用固有技能【捕食】。》', 'system');
    pushLog('【捕食】。把東西吞進體內，解析、收為己用。這就是史萊姆的生存方式。');
    setChoices([
      {
        tag: '捕食', text: '吞下藥草與鏽劍，試試這個身體的本事', evil: isEvil(),
        fn: () => {
          G.flags.predator = true;
          addSkill({ id: 'devour', name: '捕食', desc: '吞噬並解析目標（戰鬥可用／衰弱的敵人可整隻吞下）', cost: 3 });
          pushLog('身體無聲地張開，把藥草和鏽劍一齊捲入。體內傳來奇妙的酥麻——《解析完了。回復藥草：可隨時於體內精製。鏽劍：鐵成分已儲存。獲得技能：【捕食】。》', 'system');
          pushLog(isEvil()
            ? '懷念的感覺。你還是邪念的時候，吞的是恐懼和慾望；現在你有了身體，能吞的東西——可就多了。'
            : '有點不可思議。明明是吞食，卻不覺得殘忍，倒像是這具身體與生俱來的禮儀：萬物入流，皆有去處。', isEvil() ? 'evil' : '');
          go('p9');
        },
      },
      { tag: '默哀', text: '先對著遺骸靜默片刻，再進行捕食', fn: () => { pushLog('你對白骨靜默了一會兒。不知道他是誰、為何死在這裡——但三百年來第一個路過的，至少可以記得他存在過。'); G.flags.mourned = true; SCENES._doDevour(); } },
    ]);
  },
  _doDevour() {
    G.flags.predator = true;
    addSkill({ id: 'devour', name: '捕食', desc: '吞噬並解析目標（戰鬥可用／衰弱的敵人可整隻吞下）', cost: 3 });
    pushLog('《解析完了。回復藥草：可隨時於體內精製。鏽劍：鐵成分已儲存。獲得技能：【捕食】。》', 'system');
    pushLog('白骨在捕食的微光中安靜地散去，像終於被允許休息。');
    SCENES.p9();
  },

  p9() {
    pushLog('洞窟的出口透進第一縷天光時，你也撞見了這具身體的第一批「鄰居」——三隻哥布林，正圍著一隻被陷阱夾住的角兔，吵著怎麼分。');
    pushLog('最壯的那隻先發現了你。「史萊姆？」牠咧嘴露出黃牙，舉起木棒，「運氣好！今天加菜！」', 'speech');
    setChoices([
      { tag: '戰鬥', text: '加菜的是我。——迎戰！', fn: () => startBattle({ name: '哥布林戰士', hp: 18, maxHp: 18, atk: 3 }, () => { pushLog('剩下兩隻哥布林面面相覷，丟下木棒落荒而逃，連角兔都忘了拿。'); go('p10'); }) },
      {
        tag: '威嚇', text: '釋放全身魔素：「滾。不然連你們一起吞。」',
        fn: () => rollCheck('威嚇', G.stats.cha >= G.stats.str ? 'cha' : 'str', 12,
          () => { pushLog('被命名強化過的魔素轟然炸開。三隻哥布林的腿同時軟了——牠們大概一輩子沒見過會散發龍之氣息的史萊姆。「魔、魔物大人對不起——！」逃跑的速度快得留下殘影。', 'system'); G.flags.goblinFear = true; go('p10'); },
          () => { pushLog('魔素放是放出來了，但形狀軟趴趴的，像在發光的麻糬。哥布林愣了兩秒，笑出聲來，舉著木棒衝了上來！'); startBattle({ name: '哥布林戰士', hp: 18, maxHp: 18, atk: 3 }, () => { pushLog('剩下兩隻哥布林尖叫著逃進了林子。'); go('p10'); }); }),
      },
      {
        tag: '魅力', text: '「等等。那隻角兔給你們，我幫你們解陷阱，交個朋友？」',
        fn: () => rollCheck('交涉', 'cha', 11,
          () => { pushLog('哥布林們交頭接耳了半天。最後最壯的那隻收起木棒，警惕地點了點頭。你用體內儲存的鐵成分撬開了陷阱。', 'system'); pushLog('「……奇怪的史萊姆。」牠把角兔扛上肩，丟下一句，「東邊的洞別去，有大蜈蚣。村子在北邊。」——你在這個世界的第一份情報，來自哥布林。', 'speech'); G.flags.goblinAlly = true; go('p10'); },
          () => { pushLog('「史萊姆會講話！」三隻哥布林嚇得炸毛，反而覺得你是什麼不祥的妖物，怪叫著舉棒衝來！'); startBattle({ name: '哥布林戰士', hp: 18, maxHp: 18, atk: 3 }, () => { pushLog('剩下兩隻哥布林哭著跑了。交朋友失敗。'); go('p10'); }); }),
      },
    ]);
  },

  /* —— 尾聲 —— */
  p10() {
    pushTitle('尾聲 · 受傷的天空');
    pushLog('你滾出洞窟，第一次用這具身體看見天空。');
    pushLog('封龍峽谷的夜空本該綴滿星星。但南方的地平線上，懸著一片不自然的綠色光暈——三百里外，米德加雅的方向。被炸開的五號星髓爐仍在燃燒，星球的血在夜空裡發著光。');
    pushLog('「看見了吧。」維爾汎的聲音穿過岩層，直接響在你的意識裡——名字的連結，「那就是你死去的地方，也是一切開始的地方。神籠不會停手。星球也不會。」', 'speech');
    if (G.flags.will === 'revenge') pushLog('星髓之流裡你許下的那句話，又浮了上來：<i>我要親手終結神籠。</i>現在的你只是一隻史萊姆。但「現在」，從來不是終點。');
    else if (G.flags.will === 'devator') pushLog('你「望」著那條燃燒的綠光，體內某個深處的飢餓輕輕動了一下。總有一天，連那條洪流，你都要嚐嚐味道。', 'evil');
    else pushLog('你許過的願望很簡單：活下去。但看著那片受傷的天空，你隱約明白——在這個星球上，「活下去」這件事，從來都不簡單。');
    if (G.flags.goblinAlly) pushLog('北邊，哥布林說的村落方向，升起了幾縷炊煙。');
    pushLog('「去吧，' + G.name + '·泰恩。」龍說，「去看看這個爛掉一半的世界。然後回來告訴本座——它還值不值得救。」', 'speech');
    pushLog('黏體在月光下輕輕晃了一下，算是點頭。');
    pushLog('你朝著炊煙與綠光之間的荒野，滾出了第一步。');
    const log = $('log');
    const card = document.createElement('div');
    card.className = 'end-card';
    card.innerHTML = '<div class="zh">序 章 完</div><div class="en">— Prologue End · 第一章「哥布林的村落」製作中 —</div>';
    log.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'end' });
    G.scene = 'end';
    save();
    setChoices([
      { tag: '重來', text: '以另一個起源，重新經歷序章', fn: () => { localStorage.removeItem(SAVE_KEY); location.reload(); } },
      { tag: '離開', text: '回到花園首頁', fn: () => { location.href = '/'; } },
    ]);
  },
};

function go(id) {
  G.scene = id;
  save();
  setTimeout(() => SCENES[id](), 200);
}

/* ============================================================
   初始化
   ============================================================ */
function showScreen(id) {
  ['screen-title', 'screen-create', 'screen-game'].forEach(s => $(s).style.display = s === id ? (s === 'screen-game' ? 'grid' : 'block') : 'none');
}

function startGame(name, origin) {
  G = newState(name, origin);
  showScreen('screen-game');
  renderSide();
  SCENES.p1();
}

function resumeGame(saved) {
  G = saved;
  showScreen('screen-game');
  renderSide();
  $('log').innerHTML = '';
  G.log = [];
  if (G.scene === 'end') {
    appendPara('— 序章已通關 —', 'system');
    setChoices([
      { tag: '重來', text: '以另一個起源，重新經歷序章', fn: () => { localStorage.removeItem(SAVE_KEY); location.reload(); } },
      { tag: '離開', text: '回到花園首頁', fn: () => { location.href = '/'; } },
    ]);
  } else {
    appendPara('— 從上次的場景繼續 —', 'system');
    SCENES[G.scene]();
  }
}

// 建角畫面
(function buildCreation() {
  const grid = $('origin-grid');
  Object.entries(ORIGINS).forEach(([key, o]) => {
    const card = document.createElement('button');
    card.className = 'origin-card' + (o.evil ? ' evil-card' : '');
    card.innerHTML =
      '<h4>' + o.name + '</h4><div class="origin-sub">' + o.sub + '</div>' +
      '<div class="origin-desc">' + o.desc + '</div>' +
      '<div class="origin-stats">力' + o.stats.str + ' · 敏' + o.stats.agi + ' · 智' + o.stats.int + ' · 魅' + o.stats.cha + ' ｜ HP ' + o.hp + ' · MP ' + o.mp + '</div>';
    card.onclick = () => {
      const name = $('name-input').value.trim() || (o.evil ? '無名之念' : '無名旅人');
      startGame(name, key);
    };
    grid.appendChild(card);
  });
})();

$('btn-new').onclick = () => { localStorage.removeItem(SAVE_KEY); showScreen('screen-create'); };
$('btn-restart').onclick = () => { if (confirm('要放棄目前進度，重新開始序章嗎？')) { localStorage.removeItem(SAVE_KEY); location.reload(); } };

const saved = load();
if (saved && saved.scene) {
  const btn = $('btn-continue');
  btn.style.display = '';
  btn.onclick = () => resumeGame(saved);
}
</script>
</body>
</html>
