<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>星命浮空城 — 文字RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06080f; --bg2:#0d1220; --panel:rgba(13,18,32,0.97);
  --border:rgba(78,154,241,0.22); --border2:rgba(78,154,241,0.5);
  --blue:#4e9af1; --blue2:#7ec8ff; --gold:#f0b429; --gold2:#ffd166;
  --red:#ff6b6b; --green:#51cf66; --purple:#cc5de8; --teal:#20c997;
  --text:#c8d8f0; --text2:#8fa8d0; --text3:#4a6a90;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC','Noto Sans',sans-serif;font-size:14px;
  background-image:
    radial-gradient(circle at 15% 25%,rgba(78,154,241,.07) 0%,transparent 45%),
    radial-gradient(circle at 85% 75%,rgba(204,93,232,.07) 0%,transparent 45%),
    radial-gradient(circle at 50% 50%,rgba(240,180,41,.04) 0%,transparent 60%);
}
/* ── LAYOUT ── */
#game-root{display:flex;height:100vh;max-width:1440px;margin:0 auto;padding:10px;gap:10px}
.panel{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:14px;overflow:hidden;position:relative;flex-shrink:0;
}
.panel::after{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(78,154,241,.4),transparent);
}
#pl{width:250px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
#pc{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#pr{width:230px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(78,154,241,.25);border-radius:2px}

/* ── TYPOGRAPHY ── */
.ptitle{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;
  color:var(--blue);text-transform:uppercase;margin-bottom:8px;
  padding-bottom:7px;border-bottom:1px solid var(--border);
}
.slabel{font-size:9px;letter-spacing:.13em;color:var(--text3);text-transform:uppercase;margin-bottom:5px}

/* ── CHARACTER PORTRAIT ── */
.portrait{
  width:100%;aspect-ratio:1;max-height:120px;border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(135deg,#0a1528 0%,#1a0a2e 100%);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
}
.portrait-emoji{font-size:52px;line-height:1;filter:drop-shadow(0 0 12px rgba(78,154,241,.5))}
.portrait-badge{
  position:absolute;bottom:5px;right:5px;font-size:9px;letter-spacing:.1em;
  color:var(--gold);background:rgba(240,180,41,.15);border:1px solid rgba(240,180,41,.3);
  border-radius:999px;padding:2px 7px;
}

/* ── STAT BARS ── */
.sbar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sbar-lbl{font-size:10px;color:var(--text3);width:22px;flex-shrink:0}
.sbar-wrap{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.sbar{height:100%;border-radius:999px;transition:width .4s ease}
.sbar.hp{background:linear-gradient(90deg,#c92a2a,#ff6b6b)}
.sbar.mp{background:linear-gradient(90deg,#1864ab,#4e9af1)}
.sbar.xp{background:linear-gradient(90deg,#a0670a,#ffd166)}
.sbar-val{font-size:10px;color:var(--text2);white-space:nowrap;min-width:50px;text-align:right}

/* ── STAT GRID ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sitem{
  background:rgba(78,154,241,.05);border:1px solid rgba(78,154,241,.1);
  border-radius:7px;padding:5px 7px;
}
.sitem-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.sitem-v{font-size:14px;font-weight:700;color:var(--text)}

/* ── EQUIPMENT ── */
.eslot{
  display:flex;align-items:center;gap:7px;padding:6px 9px;
  background:rgba(78,154,241,.03);border:1px solid var(--border);border-radius:7px;
  margin-bottom:4px;cursor:pointer;transition:all .2s;
}
.eslot:hover{background:rgba(78,154,241,.1);border-color:var(--border2)}
.eslot-ico{font-size:16px;width:22px;text-align:center}
.eslot-info{flex:1;min-width:0}
.eslot-type{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.eslot-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eslot-name.empty{color:var(--text3);font-style:italic}

/* ── GOLD ── */
.gold-bar{
  display:flex;align-items:center;gap:7px;padding:7px 10px;
  background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.18);border-radius:7px;
}
.gold-amt{font-size:15px;font-weight:700;color:var(--gold2)}
.gold-lbl{font-size:9px;color:var(--text3);margin-left:auto;letter-spacing:.1em}

/* ── STATUS EFFECTS ── */
.sfx-row{display:flex;gap:4px;flex-wrap:wrap;min-height:18px;margin-bottom:5px}
.sfx-badge{font-size:10px;padding:1px 6px;border-radius:999px}
.sfx-poison{background:rgba(160,0,200,.15);border:1px solid rgba(160,0,200,.3);color:#cc77ff}
.sfx-burn{background:rgba(255,100,0,.15);border:1px solid rgba(255,100,0,.3);color:#ff9955}
.sfx-slow{background:rgba(100,150,255,.15);border:1px solid rgba(100,150,255,.3);color:#88aaff}

/* ── CENTER CONTENT ── */
#pci{flex:1;overflow-y:auto;padding:2px 2px 2px 0}
.loc-hdr{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(78,154,241,.06);border:1px solid var(--border);
  border-radius:10px;margin-bottom:12px;
}
.loc-ico{font-size:20px}
.loc-name{font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);letter-spacing:.05em}
.loc-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ── STORY BOX ── */
.storybox{
  background:rgba(0,0,0,.28);border:1px solid var(--border);
  border-left:3px solid var(--blue);border-radius:0 10px 10px 0;
  padding:12px 14px;margin-bottom:12px;line-height:1.85;font-size:13px;
}
.storybox p{margin-bottom:8px}
.storybox p:last-child{margin-bottom:0}

/* ── NPC BUBBLE ── */
.npc-bubble{
  background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.2);
  border-radius:0 10px 10px 10px;padding:9px 12px;margin-bottom:10px;
  font-size:13px;line-height:1.7;
}
.npc-name{font-size:9px;letter-spacing:.1em;color:var(--gold);margin-bottom:3px;text-transform:uppercase}

/* ── ACTION BUTTONS ── */
.agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.agrid.full{grid-template-columns:1fr}
.abtn{
  padding:11px 14px;background:rgba(78,154,241,.07);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:13px;cursor:pointer;text-align:left;transition:all .2s;
  display:flex;align-items:center;gap:9px;
}
.abtn:hover:not(.dis){background:rgba(78,154,241,.16);border-color:var(--border2);transform:translateY(-1px)}
.abtn:active:not(.dis){transform:translateY(0)}
.abtn.pri{background:rgba(78,154,241,.14);border-color:rgba(78,154,241,.38);color:var(--blue2)}
.abtn.danger{background:rgba(255,107,107,.07);border-color:rgba(255,107,107,.28);color:var(--red)}
.abtn.suc{background:rgba(81,207,102,.07);border-color:rgba(81,207,102,.28);color:var(--green)}
.abtn.gold{background:rgba(240,180,41,.07);border-color:rgba(240,180,41,.28);color:var(--gold2)}
.abtn.dis{opacity:.38;cursor:not-allowed}
.abtn-ico{font-size:18px;flex-shrink:0}
.abtn-txt{flex:1}
.abtn-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ── BATTLE ── */
.b-enemy{
  background:rgba(255,107,107,.05);border:1px solid rgba(255,107,107,.18);
  border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:14px;align-items:center;
}
.b-enemy-art{font-size:44px;line-height:1;min-width:56px;text-align:center;
  filter:drop-shadow(0 0 10px rgba(255,80,80,.4))}
.b-enemy-info{flex:1}
.b-ename{font-family:'Cinzel',serif;font-size:15px;color:var(--red);margin-bottom:4px}
.b-edesc{font-size:11px;color:var(--text3);margin-bottom:7px;line-height:1.55}
.b-elvl{
  display:inline-block;font-size:10px;color:var(--red);
  background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.22);
  border-radius:999px;padding:1px 7px;margin-bottom:6px;
}
.blog{
  background:rgba(0,0,0,.32);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;height:130px;overflow-y:auto;margin-bottom:10px;
  font-size:12px;line-height:1.7;
}
.bl-p{color:var(--blue2)}.bl-e{color:var(--red)}.bl-s{color:var(--gold)}
.bl-h{color:var(--green)}.bl-k{color:var(--purple)}.bl-i{color:var(--teal)}
.bl-line{margin-bottom:1px}
.bcmds{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.bcmd{
  padding:9px 6px;background:rgba(78,154,241,.07);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:12px;cursor:pointer;text-align:center;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.bcmd:hover:not(.dis){background:rgba(78,154,241,.18);border-color:var(--border2)}
.bcmd.dis{opacity:.38;cursor:not-allowed}
.bcmd-ico{font-size:18px}
.sub-panel{
  background:rgba(0,0,0,.38);border:1px solid var(--border);border-radius:9px;
  padding:8px;margin-bottom:8px;display:none;max-height:170px;overflow-y:auto;
}
.sub-panel.open{display:block}
.spi{
  display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:5px;
  cursor:pointer;transition:background .15s;
}
.spi:hover:not(.dis){background:rgba(78,154,241,.1)}
.spi.dis{opacity:.38;cursor:not-allowed}
.spi-ico{font-size:15px;width:18px;text-align:center}
.spi-name{flex:1;font-size:12px}
.spi-cost{font-size:10px;color:var(--blue);padding:1px 5px;background:rgba(78,154,241,.1);border-radius:999px}
.spi-qty{font-size:10px;color:var(--text3)}

/* ── SHOP ── */
.stabs{display:flex;gap:4px;margin-bottom:10px}
.stab{
  padding:5px 12px;border-radius:999px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);color:var(--text3);transition:all .2s;
}
.stab.on{background:rgba(78,154,241,.14);border-color:var(--border2);color:var(--blue2)}
.sitem{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border:1px solid var(--border);border-radius:7px;margin-bottom:5px;
  cursor:pointer;transition:all .2s;
}
.sitem:hover{background:rgba(78,154,241,.06);border-color:var(--border2)}
.sitem-ico{font-size:18px;width:26px;text-align:center}
.sitem-info{flex:1}
.sitem-name{font-size:13px}
.sitem-desc{font-size:11px;color:var(--text3);margin-top:1px}
.sitem-price{font-size:13px;color:var(--gold2);font-weight:600;white-space:nowrap}
.sitem-owned{font-size:10px;color:var(--text3);white-space:nowrap;margin-right:4px}

/* ── RIGHT PANEL ITEMS ── */
.inv-item{
  display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:5px;
  cursor:pointer;transition:background .15s;
}
.inv-item:hover{background:rgba(78,154,241,.07)}
.inv-ico{font-size:13px;width:17px;text-align:center}
.inv-name{flex:1;font-size:12px}
.inv-qty{font-size:10px;color:var(--text3);background:rgba(255,255,255,.06);border-radius:999px;padding:1px 5px}

.sk-chip{
  display:flex;align-items:center;gap:6px;padding:5px 7px;
  border:1px solid rgba(204,93,232,.18);background:rgba(204,93,232,.05);
  border-radius:5px;margin-bottom:3px;font-size:11px;
}
.sk-ico{font-size:13px}.sk-name{flex:1;color:var(--text)}
.sk-mp{font-size:9px;color:var(--blue);background:rgba(78,154,241,.1);border-radius:999px;padding:1px 5px}

/* ── LEVEL UP BANNER ── */
@keyframes lvlup{from{opacity:0;transform:scale(.85) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)}}
.lvlup-banner{
  background:linear-gradient(135deg,rgba(240,180,41,.13),rgba(255,209,102,.07));
  border:1px solid rgba(240,180,41,.38);border-radius:9px;padding:12px 14px;
  margin-bottom:10px;text-align:center;animation:lvlup .45s ease;
}
.lvlup-title{font-family:'Cinzel',serif;font-size:17px;color:var(--gold2);letter-spacing:.1em;margin-bottom:5px}
.lvlup-stats{font-size:12px;color:var(--text2);line-height:1.8}

/* ── DANGER BADGES ── */
.dbadge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;margin-left:6px}
.d1{background:rgba(81,207,102,.13);border:1px solid rgba(81,207,102,.28);color:var(--green)}
.d2{background:rgba(255,212,59,.1);border:1px solid rgba(255,212,59,.28);color:#ffd43b}
.d3{background:rgba(255,150,0,.1);border:1px solid rgba(255,150,0,.28);color:#ff9933}
.d4{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.28);color:var(--red)}
.d5{background:rgba(204,93,232,.1);border:1px solid rgba(204,93,232,.28);color:var(--purple)}

/* ── TITLE SCREEN ── */
#title-scr{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,#0d1525 0%,#06080f 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:10px;
}
.t-logo{
  font-family:'Cinzel',serif;font-size:clamp(26px,5vw,46px);
  color:var(--gold2);letter-spacing:.18em;text-align:center;
  text-shadow:0 0 30px rgba(240,180,41,.45),0 0 70px rgba(240,180,41,.2);
  margin-bottom:4px;
}
.t-sub{font-size:12px;color:var(--text3);letter-spacing:.28em;text-align:center;margin-bottom:20px}
.t-btn{
  padding:11px 38px;background:rgba(78,154,241,.11);border:1px solid rgba(78,154,241,.38);
  border-radius:999px;color:var(--blue2);font-family:'Noto Sans TC',sans-serif;
  font-size:13px;letter-spacing:.1em;cursor:pointer;transition:all .25s;
}
.t-btn:hover{background:rgba(78,154,241,.22);border-color:rgba(78,154,241,.6);transform:translateY(-2px);box-shadow:0 4px 20px rgba(78,154,241,.2)}
.t-ver{position:absolute;bottom:16px;font-size:11px;color:var(--text3);letter-spacing:.1em}
.t-story{
  max-width:420px;text-align:center;font-size:12px;color:var(--text3);
  line-height:1.8;margin-bottom:8px;padding:0 20px;
}

/* ── CHAR CREATE ── */
#cc-scr{
  position:fixed;inset:0;background:rgba(6,8,15,.97);
  display:flex;align-items:center;justify-content:center;z-index:90;display:none;
}
.cc-box{
  background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:28px;width:min(480px,92vw);max-height:92vh;overflow-y:auto;
}
.cc-title{font-family:'Cinzel',serif;font-size:19px;color:var(--gold2);text-align:center;margin-bottom:22px;letter-spacing:.1em}
.cc-sec{margin-bottom:18px}
.cc-lbl{font-size:11px;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:7px}
.name-inp{
  width:100%;padding:9px 13px;background:rgba(78,154,241,.05);
  border:1px solid var(--border);border-radius:7px;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;transition:all .2s;
}
.name-inp:focus{border-color:var(--border2);background:rgba(78,154,241,.1)}
.cls-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cls-card{
  padding:13px;background:rgba(78,154,241,.03);border:2px solid var(--border);
  border-radius:11px;cursor:pointer;transition:all .2s;text-align:center;
}
.cls-card:hover{background:rgba(78,154,241,.09);border-color:var(--border2)}
.cls-card.sel{background:rgba(78,154,241,.14);border-color:var(--blue);box-shadow:0 0 16px rgba(78,154,241,.14)}
.cls-ico{font-size:34px;margin-bottom:7px}
.cls-name{font-family:'Cinzel',serif;font-size:13px;color:var(--text);margin-bottom:5px}
.cls-desc{font-size:11px;color:var(--text3);line-height:1.5}
.cls-stats{margin-top:7px;display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.cls-sb{font-size:10px;padding:2px 6px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--text2)}
.cc-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,rgba(240,180,41,.18),rgba(240,180,41,.09));
  border:1px solid rgba(240,180,41,.38);border-radius:9px;color:var(--gold2);
  font-family:'Noto Sans TC',sans-serif;font-size:13px;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;margin-top:7px;
}
.cc-btn:hover{background:linear-gradient(135deg,rgba(240,180,41,.28),rgba(240,180,41,.14));border-color:rgba(240,180,41,.55)}

/* ── TOAST ── */
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border);border-radius:999px;
  padding:7px 18px;font-size:12px;z-index:200;animation:tin .28s ease;
  white-space:nowrap;pointer-events:none;
}

/* ── MODAL ── */
.modal-ov{
  position:fixed;inset:0;background:rgba(6,8,15,.82);z-index:150;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);display:none;
}
.modal-box{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:22px;width:min(380px,92vw);max-height:80vh;overflow-y:auto;
}
.modal-t{font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);margin-bottom:10px}
.modal-d{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.modal-sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px}
.modal-sr{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 7px;background:rgba(78,154,241,.05);border-radius:5px;font-size:12px;
}
.modal-sr span:first-child{color:var(--text3)}
.modal-sr span:last-child{color:var(--text);font-weight:600}
.mbtns{display:flex;gap:7px}
.mbtn{
  flex:1;padding:8px;border-radius:7px;font-family:'Noto Sans TC',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;border:1px solid var(--border);
  color:var(--text);background:rgba(78,154,241,.07);
}
.mbtn:hover{background:rgba(78,154,241,.14)}
.mbtn.pri{background:rgba(78,154,241,.14);border-color:rgba(78,154,241,.38);color:var(--blue2)}
.mbtn.gold{background:rgba(240,180,41,.1);border-color:rgba(240,180,41,.32);color:var(--gold2)}
.mbtn.cancel{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2);color:var(--red)}

/* ── AREA CARD ── */
.acard{
  border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:7px;
  cursor:pointer;transition:all .2s;
}
.acard:hover:not(.locked){background:rgba(78,154,241,.06);border-color:var(--border2)}
.acard.locked{opacity:.45;cursor:not-allowed}
.acard.cleared{border-color:rgba(81,207,102,.28);background:rgba(81,207,102,.04)}
.acard-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.acard-ico{font-size:18px}
.acard-name{font-size:14px;font-weight:500}
.acard-desc{font-size:11px;color:var(--text3);line-height:1.55}
.acard-footer{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:10px;color:var(--text3)}

/* ── BACK LINK ── */
.back-link{
  position:absolute;top:10px;left:10px;font-size:12px;color:var(--text3);
  text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:999px;
  transition:all .2s;z-index:10;
}
.back-link:hover{color:var(--text);border-color:var(--border2)}

/* ── GAME OVER / VICTORY ── */
.bigscreen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;padding:20px;
}
.bs-title{font-family:'Cinzel',serif;font-size:28px;letter-spacing:.15em;margin-bottom:12px}
.bs-title.red{color:var(--red);text-shadow:0 0 30px rgba(255,107,107,.4)}
.bs-title.gold{color:var(--gold2);text-shadow:0 0 30px rgba(240,180,41,.4)}
.bs-desc{font-size:14px;color:var(--text3);line-height:1.8;max-width:400px;margin-bottom:24px}

/* ── PULSE ANIMATION ── */
@keyframes pulse{0%,100%{opacity:1} 50%{opacity:.55}}
.pulse{animation:pulse 2.2s ease infinite}

/* Responsive */
@media(max-width:900px){#pl{width:210px}#pr{width:200px}}
@media(max-width:680px){#game-root{padding:6px;gap:6px}#pl{width:170px}#pr{display:none}}

function saveGame() { if (G) localStorage.setItem('star_rpg_v1', JSON.stringify(G)); }

  return false;
}

// ═══════════════════════════════════════════
//  STAT HELPERS
// ═══════════════════════════════════════════
function getStats(p) {
  let {atk,def,spd,hpMax,mpMax,crit} = p;
  const apply = id => {
    if (!id) return;
    const e = EQUIP[id]; if (!e) return;
    atk += e.atk||0; def += e.def||0; spd += e.spd||0;
    hpMax += e.hpMax||0; mpMax += e.mpMax||0; crit += e.crit||0;
  };
  apply(p.equip.weapon); apply(p.equip.armor); apply(p.equip.acc);
  return {atk,def,spd,hpMax,mpMax,crit};
}

function getInvItem(p, id) { return p.inv.find(x=>x.id===id); }
function addInv(p, id, qty=1) {
  const ex = getInvItem(p, id);
  if (ex) ex.qty += qty;
  else p.inv.push({id, qty});
}
function removeInv(p, id, qty=1) {
  const ex = getInvItem(p, id);
  if (!ex) return;
  ex.qty -= qty;
  if (ex.qty <= 0) p.inv = p.inv.filter(x=>x.id!==id);
}

function dmgCalc(atk, def, crit=0) {
  const base = Math.max(1, atk - def);
  const variance = 0.85 + Math.random() * 0.3;
  const isCrit = Math.random() * 100 < crit;
  const dmg = Math.round(base * variance * (isCrit ? 1.8 : 1));
  return {dmg, isCrit};
}

function hasSfx(p, name) { return p.sfx.includes(name); }
function addSfx(p, name) { if (!hasSfx(p, name)) p.sfx.push(name); }
function removeSfx(p, name) { p.sfx = p.sfx.filter(x=>x!==name); }

// ═══════════════════════════════════════════
//  LEVEL / EXP
// ═══════════════════════════════════════════
function gainXP(amount) {
  const p = G.player;
  p.xp += amount;
  while (p.xp >= p.xpNext && p.lv < 10) {
    p.xp -= p.xpNext;
    p.lv++;
    const isSW = p.cls === 'swordsman';
    const gains = {
      hpMax: isSW ? 20 : 12,
      mpMax: isSW ? 6 : 15,
      atk: isSW ? 4 : 3,
      def: isSW ? 3 : 2,
      spd: isSW ? 2 : 2,
    };
    Object.entries(gains).forEach(([k,v]) => p[k] += v);
    p.hp = Math.min(p.hp + 30, getStats(p).hpMax);
    p.mp = Math.min(p.mp + 10, getStats(p).mpMax);
    p.xpNext = Math.round(p.xpNext * 1.5);
    // unlock skills
    const newSkills = Object.entries(SKILLS)
      .filter(([id,sk]) => sk.cls === p.cls && sk.unlockLv === p.lv && !p.skills.includes(id))
      .map(([id]) => id);
    newSkills.forEach(id => p.skills.push(id));
    G.pendingLvUp = {lv: p.lv, gains, newSkills};
  }
}

function startBattle(enemyId) {
  const base = ENEMIES[enemyId];
  G.battle = {
    enemyId,
    enemy: {
      ...base,
      hpMax: base.hp,
      sfx: [],
      defDebuff: 0,
    },
    subCmd: null,
    playerTurn: true,
  };
  G.battleLog = [
    {txt:`遭遇了 ${base.name}！`, cls:'bl-s'},
    {txt:`${base.isBoss ? '⚠️ BOSS戰！' : '戰鬥開始！'}`, cls:'bl-s'},
  ];
  G.screen = 'battle';
  render();
}

function addBL(txt, cls='') { G.battleLog.push({txt, cls}); }

function playerAction(act, data) {
  if (!G.battle || !G.battle.playerTurn) return;
  const p = G.player;
  const b = G.battle;
  const e = b.enemy;
  const st = getStats(p);
  b.subCmd = null;

  if (act === 'attack') {
    const {dmg, isCrit} = dmgCalc(st.atk, Math.max(0, e.def - e.defDebuff), st.crit);
    e.hp = Math.max(0, e.hp - dmg);
    addBL(`${p.name} 發動攻擊！造成 ${dmg}${isCrit ? ' 💥暴擊！' : ''} 傷害`, 'bl-p');
    // Dark blade lifesteal
    if (p.equip.weapon === 'darkBlade') {
      const steal = Math.round(dmg * 0.15);
      p.hp = Math.min(getStats(p).hpMax, p.hp + steal);
      if (steal > 0) addBL(`暗夜刃吸取 ${steal} HP！`, 'bl-h');
    }

  } else if (act === 'skill') {
    const sk = SKILLS[data];
    if (!sk || p.mp < sk.mp) return;
    p.mp -= sk.mp;
    addBL(`${p.name} 使用【${sk.name}】！`, 'bl-k');

    if (sk.heal) {
      const h = Math.min(sk.heal, getStats(p).hpMax - p.hp);
      p.hp += h;
      addBL(`回復了 ${h} HP！`, 'bl-h');
    } else if (sk.gravity) {
      const dmg = Math.floor(e.hp / 2);
      e.hp = Math.max(1, e.hp - dmg);
      addBL(`重力術造成 ${dmg} 傷害！`, 'bl-k');
    } else {
      let totalDmg = 0;
      const hits = sk.hits || 1;
      let atkPow = st.atk;
      if (sk.spdScale) atkPow = Math.round(st.atk * (1 + st.spd * 0.02));
      const eDef = sk.ignoredef ? 0 : Math.max(0, e.def - e.defDebuff);
      for (let i = 0; i < hits; i++) {
        const {dmg} = dmgCalc(atkPow * sk.dmgMult, eDef, st.crit);
        e.hp = Math.max(0, e.hp - dmg);
        totalDmg += dmg;
      }
      addBL(`${hits > 1 ? `${hits}連擊！` : ''}造成 ${totalDmg} 傷害！`, 'bl-k');
      if (sk.debuff === 'def') {
        e.defDebuff = (e.defDebuff || 0) + 8;
        addBL(`敵人防禦降低！`, 'bl-s');
      }
    }
    if (sk.healSelf) {
      const h = Math.min(sk.healSelf, getStats(p).hpMax - p.hp);
      p.hp += h;
      if (h > 0) addBL(`吸收 ${h} HP！`, 'bl-h');
    }

  } else if (act === 'item') {
    const item = ITEMS[data];
    const inv = getInvItem(p, data);
    if (!inv || inv.qty < 1) return;
    removeInv(p, data, 1);
    addBL(`使用【${item.name}】`, 'bl-i');
    if (item.effect.hp) {
      const h = Math.min(item.effect.hp, getStats(p).hpMax - p.hp);
      p.hp += h;
      addBL(`回復了 ${h} HP！`, 'bl-h');
    }
    if (item.effect.mp) {
      const m = Math.min(item.effect.mp, getStats(p).mpMax - p.mp);
      p.mp += m;
      addBL(`回復了 ${m} MP！`, 'bl-h');
    }
    if (item.effect.cure) { removeSfx(p, item.effect.cure); addBL(`解除了${item.effect.cure === 'poison' ? '中毒' : '燃燒'}狀態！`, 'bl-h'); }
    if (item.effect.dmg) {
      e.hp = Math.max(0, e.hp - item.effect.dmg);
      addBL(`對敵人造成 ${item.effect.dmg} 傷害！`, 'bl-i');
    }
    if (item.effect.flee) { addBL(`煙幕擴散！成功逃跑！`, 'bl-s'); G.battle = null; G.screen = 'explore'; render(); return; }

  } else if (act === 'flee') {
    const chance = 40 + st.spd * 2;
    if (Math.random() * 100 < chance) {
      addBL(`成功逃跑！`, 'bl-s');
      G.battle = null;
      G.screen = 'explore';
      render(); return;
    } else {
      addBL(`逃跑失敗！`, 'bl-e');
    }
  }

  if (e.hp <= 0) { battleWin(); return; }
  b.playerTurn = false;
  setTimeout(() => { enemyTurn(); }, 600);
}

function enemyTurn() {
  const p = G.player;
  const b = G.battle;
  if (!b) return;
  const e = b.enemy;
  const st = getStats(p);

  // Status effects on player
  if (hasSfx(p, 'poison')) {
    const dot = Math.round(getStats(p).hpMax * 0.06);
    p.hp = Math.max(0, p.hp - dot);
    addBL(`中毒造成 ${dot} 傷害！`, 'bl-e');
  }
  if (hasSfx(p, 'burn')) {
    const dot = Math.round(getStats(p).hpMax * 0.05);
    p.hp = Math.max(0, p.hp - dot);
    addBL(`燃燒造成 ${dot} 傷害！`, 'bl-e');
  }
  if (p.hp <= 0) { gameOver(); return; }

  // Enemy attack
  const roll = Math.random();
  if (roll < 0.15 && e.canPoison && !hasSfx(p, 'poison')) {
    addBL(`${e.name} 施加了毒素！`, 'bl-e');
    addSfx(p, 'poison');
  } else if (roll < 0.1 && e.canBurn && !hasSfx(p, 'burn')) {
    addBL(`${e.name} 點燃了你！`, 'bl-e');
    addSfx(p, 'burn');
  } else {
    const boss = e.isBoss;
    const atkMult = boss && roll > 0.7 ? 1.5 : 1;
    const {dmg} = dmgCalc(e.atk * atkMult, st.def, 5);
    p.hp = Math.max(0, p.hp - dmg);
    addBL(`${e.name} 攻擊！造成 ${dmg} 傷害${boss && atkMult > 1 ? '（猛烈攻擊！）' : ''}`, 'bl-e');
  }

  if (p.hp <= 0) { gameOver(); return; }
  b.playerTurn = true;
  render();
}

function battleWin() {
  const e = G.battle.enemy;
  const p = G.player;
  addBL(`${e.name} 被擊敗了！`, 'bl-s');
  addBL(`獲得 ${e.xp} EXP、${e.gold} 金幣`, 'bl-s');
  gainXP(e.xp);
  p.gold += e.gold;
  // random drop
  if (Math.random() < 0.35) {
    const drops = ['potion','ether','antidote'];
    const drop = drops[Math.floor(Math.random()*drops.length)];
    addInv(p, drop, 1);
    addBL(`獲得道具：${ITEMS[drop].icon}${ITEMS[drop].name}`, 'bl-i');
  }
  G.battle.playerTurn = false;
  // handle exploration progress
  if (G.explore) {
    if (G.explore.phase === 'boss') {
      G.areas[G.explore.areaId].cleared = true;
      G.explore.phase = 'cleared';
    } else {
      G.explore.battlesLeft--;
      G.explore.phase = G.explore.battlesLeft <= 0 ? 'preBoss' : 'roam';
    }
  }
  saveGame();
  // check if all areas cleared
  const allClear = Object.values(G.areas).every(a=>a.cleared);
  if (allClear && G.areas.aincrad.cleared && e.isBoss && G.explore?.areaId === 'aincrad') {
    G.gameWon = true;
    G.battle = null;
    G.screen = 'gameWon';
    render(); return;
  }
  G.battle = null;
  G.screen = 'explore';
  render();
}

function gameOver() {
  G.battle = null;
  G.screen = 'gameOver';
  render();
}

// ═══════════════════════════════════════════
//  ITEM USE (outside battle)
// ═══════════════════════════════════════════
function useItemField(itemId) {
  const p = G.player;
  const st = getStats(p);
  const item = ITEMS[itemId];
  const inv = getInvItem(p, itemId);
  if (!inv || inv.qty < 1) return;
  if (item.type === 'key' || item.type === 'combat' || item.type === 'flee') { toast('⚠ 此道具只能在戰鬥中使用'); return; }
  if (item.effect.hp && p.hp >= st.hpMax) { toast('HP 已滿！'); return; }
  if (item.effect.mp && p.mp >= st.mpMax) { toast('MP 已滿！'); return; }
  removeInv(p, itemId, 1);
  if (item.effect.hp) { p.hp = Math.min(st.hpMax, p.hp + item.effect.hp); }
  if (item.effect.mp) { p.mp = Math.min(st.mpMax, p.mp + item.effect.mp); }
  if (item.effect.cure) removeSfx(p, item.effect.cure);
  toast(`使用了 ${item.icon}${item.name}`);
  saveGame();
  render();
}

// ═══════════════════════════════════════════
//  EXPLORE ENGINE
// ═══════════════════════════════════════════
function enterArea(areaId) {
  G.explore = {
    areaId,
    battlesLeft: 3,
    phase: 'roam',
  };
  G.screen = 'explore';
  render();
}

function exploreAction(action) {
  const ex = G.explore;
  const area = AREAS[ex.areaId];
  if (action === 'fight') {
    const id = area.enemies[Math.floor(Math.random() * area.enemies.length)];
    startBattle(id);
  } else if (action === 'boss') {
    ex.phase = 'boss';
    startBattle(area.boss);
  } else if (action === 'rest') {
    const p = G.player;
    const st = getStats(p);
    const h = Math.round(st.hpMax * 0.25);
    const m = Math.round(st.mpMax * 0.2);
    p.hp = Math.min(st.hpMax, p.hp + h);
    p.mp = Math.min(st.mpMax, p.mp + m);
    toast(`小憩片刻，回復了 ${h}HP、${m}MP`);
    saveGame();
    render();
  } else if (action === 'back') {
    G.explore = null;
    G.screen = 'village';
    render();
  }
}

// ═══════════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════════
function getShopData() {
  const ctx = G.shopCtx;
  if (ctx === 'mine') return SHOP_MINE;
  if (ctx === 'fortress') return SHOP_FORTRESS;
  if (ctx === 'final') return SHOP_FINAL;
  return SHOP_VILLAGE;
}

function buyItem(id, isEquip) {
  const p = G.player;
  const data = isEquip ? EQUIP[id] : ITEMS[id];
  if (!data || p.gold < data.price) { toast('金幣不足！'); return; }
  p.gold -= data.price;
  if (isEquip) {
    addInv(p, id, 1);
    toast(`購買了 ${data.icon}${data.name}`);
  } else {
    addInv(p, id, 1);
    toast(`購買了 ${data.icon}${data.name}`);
  }
  saveGame();
  render();
}

function sellItem(id) {
  const p = G.player;
  const item = ITEMS[id] || EQUIP[id];
  if (!item || item.type === 'key') { toast('無法出售此物品'); return; }
  const price = Math.floor((item.price || 10) * 0.5);
  removeInv(p, id, 1);
  p.gold += price;
  toast(`出售了 ${item.icon||''}${item.name}，獲得 ${price} 金幣`);
  saveGame();
  render();
}

function equipItem(id) {
  const p = G.player;
  const eq = EQUIP[id];
  if (!eq) return;
  const clsMatch = !eq.cls || (eq.cls === 'sw' && p.cls === 'swordsman') || (eq.cls === 'mg' && p.cls === 'mage');
  if (!clsMatch) { toast('職業不符，無法裝備'); return; }
  const slot = eq.type === 'acc' ? 'acc' : eq.type;
  const old = p.equip[slot];
  p.equip[slot] = id;
  if (old) addInv(p, old, 1);
  removeInv(p, id, 1);
  toast(`裝備了 ${eq.icon}${eq.name}`);
  saveGame();
  render();
}

function unequipSlot(slot) {
  const p = G.player;
  const id = p.equip[slot];
  if (!id) return;
  addInv(p, id, 1);
  p.equip[slot] = null;
  toast(`卸下了裝備`);
  saveGame();
  render();
}

// ═══════════════════════════════════════════
//  INN
// ═══════════════════════════════════════════
function rest(cost) {
  const p = G.player;
  if (p.gold < cost) { toast('金幣不足！'); return; }
  p.gold -= cost;
  const st = getStats(p);
  p.hp = st.hpMax;
  p.mp = st.mpMax;
  p.sfx = [];
  G.pendingLvUp = null;
  toast('完全恢復！狀態異常清除。');
  saveGame();
  G.screen = 'village';
  render();
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render() {
  renderLeft();
  renderRight();
  const s = G.screen;
  if (s === 'village')   renderVillage();
  else if (s === 'inn')  renderInn();
  else if (s === 'shop') renderShop();
  else if (s === 'guild') renderGuild();
  else if (s === 'explore') renderExplore();
  else if (s === 'battle') renderBattle();
  else if (s === 'inventory') renderInventory();
  else if (s === 'gameOver') renderGameOver();
  else if (s === 'gameWon') renderGameWon();
  if (G.pendingLvUp) { showLvUp(G.pendingLvUp); G.pendingLvUp = null; }
}

function renderLeft() {
  const p = G.player;
  const st = getStats(p);
  const cls = p.cls === 'swordsman';
  const portrait = cls ? '⚔️' : '🔮';
  const clsName = cls ? '劍士' : '法師';

  const hpPct = Math.round(p.hp / st.hpMax * 100);
  const mpPct = Math.round(p.mp / st.mpMax * 100);
  const xpPct = p.lv >= 10 ? 100 : Math.round(p.xp / p.xpNext * 100);

  const sfxHTML = p.sfx.length
    ? `<div class="sfx-row">${p.sfx.map(s=>`<span class="sfx-badge sfx-${s}">${s==='poison'?'🟣中毒':s==='burn'?'🔴燃燒':'🔵緩慢'}</span>`).join('')}</div>`
    : '';

    const id = p.equip[slot];
    const eq = id ? EQUIP[id] : null;
    return `<div class="eslot" onclick="G.screen==='battle'?null:equipModal('${slot}')">

  document.getElementById('pl-inner').innerHTML = `
    <div class="portrait"><div class="portrait-emoji">${portrait}</div><div class="portrait-badge">${clsName}</div></div>
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px">${esc(p.name)}</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Lv.${p.lv} · ${clsName}${p.lv>=10?' <span style="color:var(--gold)">MAX</span>':''}</div>
    ${sfxHTML}
    <div class="sbar-row"><span class="sbar-lbl">HP</span><div class="sbar-wrap"><div class="sbar hp" style="width:${hpPct}%"></div></div><span class="sbar-val">${p.hp}/${st.hpMax}</span></div>
    <div class="sbar-row"><span class="sbar-lbl">MP</span><div class="sbar-wrap"><div class="sbar mp" style="width:${mpPct}%"></div></div><span class="sbar-val">${p.mp}/${st.mpMax}</span></div>
    <div class="sbar-row"><span class="sbar-lbl">XP</span><div class="sbar-wrap"><div class="sbar xp" style="width:${xpPct}%"></div></div><span class="sbar-val">${p.lv<10?p.xp+'/'+p.xpNext:'MAX'}</span></div>
    <div class="sgrid" style="margin-bottom:10px">
      <div class="sitem"><div class="sitem-l">ATK</div><div class="sitem-v">${st.atk}</div></div>
      <div class="sitem"><div class="sitem-l">DEF</div><div class="sitem-v">${st.def}</div></div>
      <div class="sitem"><div class="sitem-l">SPD</div><div class="sitem-v">${st.spd}</div></div>
      <div class="sitem"><div class="sitem-l">CRIT</div><div class="sitem-v">${st.crit}%</div></div>
    </div>
    <div class="slabel">裝備</div>
    ${equipSlot('weapon','🗡️','武器')}
    ${equipSlot('armor','🛡️','防具')}
    ${equipSlot('acc','💍','飾品')}
    <div class="gold-bar" style="margin-top:8px">
      <span class="gold-icon">🪙</span>
      <span class="gold-amt">${p.gold.toLocaleString()}</span>
      <span class="gold-lbl">GOLD</span>
    </div>
  `;
}

function renderRight() {
  const p = G.player;
  const inv = p.inv.filter(x => ITEMS[x.id]);
  const equip = p.inv.filter(x => EQUIP[x.id]);
  const skills = p.skills.map(id => SKILLS[id]).filter(Boolean);

  const invHTML = inv.length
    ? inv.map(x => {
        const it = ITEMS[x.id];
        return `<div class="inv-item" onclick="useItemField('${x.id}')">
          <span class="inv-ico">${it.icon}</span>
          <span class="inv-name">${it.name}</span>
          <span class="inv-qty">×${x.qty}</span>
        </div>`;
      }).join('')
    : `<div style="font-size:11px;color:var(--text3);padding:6px">背包是空的</div>`;

  const eqHTML = equip.length
    ? equip.map(x => {
        const eq = EQUIP[x.id];
        return `<div class="inv-item" onclick="showEquipModal('${x.id}')">
          <span class="inv-ico">${eq.icon}</span>
          <span class="inv-name">${eq.name}</span>
          <span class="inv-qty">×${x.qty}</span>
        </div>`;
      }).join('')
    : `<div style="font-size:11px;color:var(--text3);padding:6px">沒有裝備</div>`;

  const skHTML = skills.map(sk => `
    <div class="sk-chip">
      <span class="sk-ico">${sk.icon}</span>
      <span class="sk-name">${sk.name}</span>
      <span class="sk-mp">MP ${sk.mp}</span>
    </div>`).join('');

  document.getElementById('pr-inner').innerHTML = `
    <div class="ptitle">道具 (${inv.reduce((s,x)=>s+x.qty,0)})</div>
    <div style="overflow-y:auto;max-height:160px">${invHTML}</div>

    <div>${skHTML}</div>

}

function renderShop() {
  const p = G.player;
  const sd = getShopData();
  const ctx = G.shopCtx;
  const shopNames = {village:'翡翠雜貨店',mine:'礦工的補給站',fortress:'黑市武器商',final:'遺跡道具屋'};
  const tab = G._shopTab || 'items';

  const itemsHTML = sd.items.map(id => {
    const it = ITEMS[id];
    const owned = getInvItem(p, id);
    const canBuy = p.gold >= it.price;
    return `<div class="sitem ${canBuy?'':'dis'}" onclick="${canBuy?`buyItem('${id}',false)`:''}">
      <span class="sitem-ico">${it.icon}</span>
      <div class="sitem-info"><div class="sitem-name">${it.name}</div><div class="sitem-desc">${it.desc}</div></div>
      ${owned?`<span class="sitem-owned">持有×${owned.qty}</span>`:''}
      <span class="sitem-price">${it.price}</span>
    </div>`;
  }).join('');

  const equipHTML = sd.equip.map(id => {
    const eq = EQUIP[id];
    const owned = getInvItem(p, id);
    const canBuy = p.gold >= eq.price;
    const equipped = Object.values(p.equip).includes(id);
    const clsOk = !eq.cls || (eq.cls === 'sw' && p.cls === 'swordsman') || (eq.cls === 'mg' && p.cls === 'mage');
    const statStr = [eq.atk&&`ATK+${eq.atk}`,eq.def&&`DEF+${eq.def}`,eq.spd&&`SPD+${eq.spd}`,eq.mpMax&&`MP+${eq.mpMax}`,eq.hpMax&&`HP+${eq.hpMax}`,eq.crit&&`CRIT+${eq.crit}`].filter(Boolean).join(' ');
    return `<div class="sitem ${canBuy&&clsOk?'':'dis'}" onclick="${canBuy&&clsOk?`buyItem('${id}',true)`:''}">
      <span class="sitem-ico">${eq.icon}</span>
      <div class="sitem-info">
        <div class="sitem-name">${eq.name} ${equipped?'<span style="color:var(--green);font-size:10px">裝備中</span>':''} ${!clsOk?'<span style="color:var(--red);font-size:10px">職業限定</span>':''}</div>
        <div class="sitem-desc">${statStr}</div>
      </div>
      ${owned?`<span class="sitem-owned">持有×${owned.qty}</span>`:''}
      <span class="sitem-price">${eq.price}</span>
    </div>`;
  }).join('');

  // Sell section: all sellable items in inventory
  const sellableItems = p.inv.filter(x => (ITEMS[x.id] && ITEMS[x.id].type !== 'key') || EQUIP[x.id]);
  const sellHTML = sellableItems.length
    ? sellableItems.map(x => {
        const it = ITEMS[x.id] || EQUIP[x.id];
        const price = Math.floor((it.price||10)*0.5);
        return `<div class="sitem" onclick="sellItem('${x.id}')">
          <span class="sitem-ico">${it.icon||'📦'}</span>
          <div class="sitem-info"><div class="sitem-name">${it.name}</div><div class="sitem-desc">×${x.qty}</div></div>
          <span class="sitem-price" style="color:var(--green)">${price}</span>
        </div>`;
      }).join('')
    : `<div style="font-size:12px;color:var(--text3);padding:10px">背包沒有可出售的物品</div>`;

  pc(`
    ${locHdr('🏪', shopNames[ctx]||'商店', 'Buy · Sell · Equip')}
    <div class="stabs">
      <div class="stab ${tab==='items'?'on':''}" onclick="G._shopTab='items';render()">消耗品</div>
      <div class="stab ${tab==='equip'?'on':''}" onclick="G._shopTab='equip';render()">裝備</div>
      <div class="stab ${tab==='sell'?'on':''}" onclick="G._shopTab='sell';render()">出售</div>
    </div>
    <div style="overflow-y:auto;flex:1;padding-right:2px">
      ${tab==='items'?itemsHTML:tab==='equip'?equipHTML:sellHTML}
    </div>
    <div class="abtn" style="margin-top:8px" onclick="G.screen=${ctx==='village'?`'village'`:`'explore'`};G._shopTab=null;render()">
      <span class="abtn-ico">←</span>
      <div class="abtn-txt">返回</div>
    </div>
  `);
}

function renderGuild() {
  const p = G.player;
  const allAreas = Object.entries(AREAS);
  const areaStatus = allAreas.map(([id, a]) => {
    const cleared = G.areas[id].cleared;
    const locked = p.lv < a.reqLv;
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span>${a.icon} ${a.name}</span>
      <span style="color:${cleared?'var(--green)':locked?'var(--text3)':'var(--gold)'}">
        ${cleared?'✓ 已清除':locked?`🔒 需Lv.${a.reqLv}`:'⚔ 待挑戰'}
      </span>
    </div>`;
  }).join('');

  const allSkills = Object.entries(SKILLS).filter(([,sk]) => sk.cls === (p.cls==='swordsman'?'sw':'mg'));
  const skHTML = allSkills.map(([id,sk]) => {
    const have = p.skills.includes(id);
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;opacity:${have?1:.4}">
      <span>${sk.icon}</span>
      <span style="flex:1;color:${have?'var(--text)':'var(--text3)'}">${sk.name}</span>
      <span style="color:var(--text3);font-size:10px">Lv.${sk.unlockLv}</span>
      <span style="color:${have?'var(--green)':'var(--text3)'};">${have?'已習得':'未習得'}</span>
    </div>`;
  }).join('');

  pc(`
    ${locHdr('📜','冒險者公會','Adventure Guild')}
    <div class="storybox">
      <p>公會記錄著你的每一步探索。冒險技能會隨著等級自動習得。</p>
    </div>
    <div class="slabel" style="margin-bottom:6px">區域進度</div>
    <div style="margin-bottom:14px">${areaStatus}</div>
    <div class="slabel" style="margin-bottom:6px">技能圖鑑</div>
    <div style="margin-bottom:12px">${skHTML}</div>
    <div class="abtn" onclick="G.screen='village';render()">
      <span class="abtn-ico">←</span><div class="abtn-txt">返回鎮上</div>
    </div>
  `);
}

function renderBattle() {
  const p = G.player;
  const b = G.battle;
  if (!b) return;
  const e = b.enemy;
  const st = getStats(p);
  const hpPct = Math.round(e.hp / e.hpMax * 100);
  const hpCol = hpPct > 50 ? 'var(--green)' : hpPct > 25 ? '#ffd43b' : 'var(--red)';

  const logHTML = G.battleLog.slice(-20).map(l => `<div class="bl-line ${l.cls}">${l.txt}</div>`).join('');

  const skillItems = p.skills.map(id => {
    const sk = SKILLS[id];
    const canUse = p.mp >= sk.mp;
    const hasHeal = sk.heal;
    return `<div class="spi ${canUse?'':'dis'}" onclick="${canUse?`playerAction('skill','${id}')`:''}" title="${sk.desc}">
      <span class="spi-ico">${sk.icon}</span>
      <span class="spi-name">${sk.name} <span style="font-size:10px;color:var(--text3)">${sk.desc}</span></span>
      <span class="spi-cost">MP ${sk.mp}</span>
    </div>`;
  }).join('');

  const itemItems = p.inv
    .filter(x => ITEMS[x.id] && ['heal','mp','full','cure','combat','flee'].includes(ITEMS[x.id].type))
    .map(x => {
      const it = ITEMS[x.id];
      return `<div class="spi" onclick="playerAction('item','${x.id}')">
        <span class="spi-ico">${it.icon}</span>
        <span class="spi-name">${it.name}</span>
        <span class="spi-qty">×${x.qty}</span>
      </div>`;
    }).join('') || `<div style="font-size:11px;color:var(--text3);padding:8px">沒有可用道具</div>`;

  const subCmd = b.subCmd;

  pc(`
    ${locHdr('⚔️','戰鬥中','Battle')}
    <div class="b-enemy">
      <div class="b-enemy-art">${e.icon}</div>
      <div class="b-enemy-info">
        <div class="b-elvl">Lv.${e.lv}${e.isBoss?' ⚠BOSS':''}</div>
        <div class="b-ename">${e.name}</div>
        <div class="b-edesc">${e.desc}</div>
        <div class="sbar-row" style="margin:0">
          <span class="sbar-lbl" style="width:28px;font-size:9px">HP</span>
          <div class="sbar-wrap" style="height:7px">
            <div class="sbar" style="width:${hpPct}%;background:${hpCol}"></div>
          </div>
          <span class="sbar-val" style="color:${hpCol}">${e.hp}/${e.hpMax}</span>
        </div>
      </div>
    </div>
    <div class="blog" id="bLog">${logHTML}</div>
    <div class="sub-panel ${subCmd==='skill'?'open':''}" id="skillPanel">${skillItems}</div>
    <div class="sub-panel ${subCmd==='item'?'open':''}" id="itemPanel">${itemItems}</div>
    <div class="bcmds">
      <div class="bcmd ${b.playerTurn?'':'dis'}" onclick="${b.playerTurn?`playerAction('attack')`:''}" title="普通攻擊">
        <span class="bcmd-ico">⚔️</span><span>攻擊</span>
      </div>
      <div class="bcmd ${b.playerTurn?'':'dis'}" onclick="${b.playerTurn?`toggleSub('skill')`:''}" title="技能">
        <span class="bcmd-ico">✨</span><span>技能</span>
      </div>
      <div class="bcmd ${b.playerTurn?'':'dis'}" onclick="${b.playerTurn?`toggleSub('item')`:''}" title="道具">
        <span class="bcmd-ico">🎒</span><span>道具</span>
      </div>
      <div class="bcmd ${b.playerTurn&&!b.enemy.isBoss?'':'dis'}" onclick="${b.playerTurn&&!b.enemy.isBoss?`playerAction('flee')`:''}" title="${b.enemy.isBoss?'無法逃離BOSS戰':'逃跑'}">
        <span class="bcmd-ico">💨</span><span>逃跑</span>
      </div>
    </div>
  `);

  // scroll battle log
  const bl = document.getElementById('bLog');
  if (bl) bl.scrollTop = bl.scrollHeight;
}

function toggleSub(type) {
  if (!G.battle) return;
  G.battle.subCmd = G.battle.subCmd === type ? null : type;
  render();
}

function showModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function equipModal(slot) {
  const p = G.player;
  const typeMap = {weapon:'weapon',armor:'armor',acc:'acc'};
  const equipped = p.equip[slot];
  const eq = equipped ? EQUIP[equipped] : null;
  const inInv = p.inv.filter(x => {
    const e = EQUIP[x.id];
    if (!e) return false;
    if (e.type !== (slot === 'acc' ? 'acc' : slot)) return false;
    const clsOk = !e.cls || (e.cls==='sw'&&p.cls==='swordsman') || (e.cls==='mg'&&p.cls==='mage');
    return clsOk;
  });

  const invOptions = inInv.length
    ? inInv.map(x => {
        const e = EQUIP[x.id];
        const statStr = [e.atk&&`ATK+${e.atk}`,e.def&&`DEF+${e.def}`,e.spd&&`SPD+${e.spd}`,e.mpMax&&`MP+${e.mpMax}`,e.hpMax&&`HP+${e.hpMax}`,e.crit&&`CRIT+${e.crit}`].filter(Boolean).join(' ');
        return `<div class="sitem" onclick="equipItem('${x.id}');closeModal()">
          <span class="sitem-ico">${e.icon}</span>
          <div class="sitem-info"><div class="sitem-name">${e.name}</div><div class="sitem-desc">${statStr}</div></div>
        </div>`;
      }).join('')
    : `<div style="font-size:12px;color:var(--text3);padding:8px">背包中沒有可裝備的道具</div>`;

  showModal(`
    <div class="modal-t">${slot==='weapon'?'⚔️ 武器':slot==='armor'?'🛡️ 防具':'💍 飾品'} 槽位</div>
    ${eq ? `<div class="modal-d">目前裝備：${eq.icon}${eq.name}<br>${eq.desc}</div>
      <div class="mbtns" style="margin-bottom:12px">
        <button class="mbtn cancel" onclick="unequipSlot('${slot}');closeModal()">卸下裝備</button>
      </div>` : '<div class="modal-d" style="font-size:12px;color:var(--text3)">目前未裝備</div>'}
    <div class="slabel">可裝備（背包中）</div>
    ${invOptions}
    <div class="mbtns" style="margin-top:10px">
      <button class="mbtn cancel" onclick="closeModal()">關閉</button>
    </div>
  `);
}

function showEquipModal(id) {
  const p = G.player;
  const eq = EQUIP[id];
  if (!eq) return;
  const slot = eq.type === 'acc' ? 'acc' : eq.type;
  const clsOk = !eq.cls || (eq.cls==='sw'&&p.cls==='swordsman') || (eq.cls==='mg'&&p.cls==='mage');
  const statStr = [eq.atk&&`ATK +${eq.atk}`,eq.def&&`DEF +${eq.def}`,eq.spd&&`SPD +${eq.spd}`,eq.mpMax&&`MP上限 +${eq.mpMax}`,eq.hpMax&&`HP上限 +${eq.hpMax}`,eq.crit&&`暴擊 +${eq.crit}%`].filter(Boolean);

  showModal(`
    <div class="modal-t">${eq.icon} ${eq.name}</div>
    <div class="modal-d">${eq.desc}</div>
    <div class="modal-sg">${statStr.map(s=>`<div class="modal-sr"><span>${s.split(' ')[0]}</span><span>${s.split(' ').slice(1).join(' ')}</span></div>`).join('')}</div>
    <div class="mbtns">
      ${clsOk ? `<button class="mbtn gold" onclick="equipItem('${id}');closeModal()">裝備</button>` : `<button class="mbtn" disabled>職業不符</button>`}
      <button class="mbtn cancel" onclick="sellItem('${id}');closeModal()">出售 (${Math.floor((eq.price||10)*.5)}G)</button>
      <button class="mbtn" onclick="closeModal()">取消</button>
    </div>
  `);
}

  showModal(`
    <div class="lvlup-banner">
      <div class="lvlup-title">✦ LEVEL UP! ✦</div>
      <div class="lvlup-stats">升至 Lv.${info.lv}</div>
    </div>
    <div class="modal-d">
      HP上限 +${info.gains.hpMax} · MP上限 +${info.gains.mpMax}<br>
      ATK +${info.gains.atk} · DEF +${info.gains.def} · SPD +${info.gains.spd}
      ${skStr}
    </div>
    <div class="mbtns"><button class="mbtn pri" onclick="closeModal()">繼續冒險 !</button></div>
  `);
}

// ═══════════════════════════════════════════
//  UI UTILITIES
// ═══════════════════════════════════════════
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

// ═══════════════════════════════════════════
//  TITLE / CHAR CREATE FLOW
// ═══════════════════════════════════════════
function showCC() {
  document.getElementById('title-scr').style.display = 'none';
  document.getElementById('cc-scr').style.display = 'flex';
  document.getElementById('game-root').style.display = 'none';
  selectedClass = null;
}

function selectClass(cls) {
  selectedClass = cls;
  document.getElementById('cls-sw').classList.toggle('sel', cls === 'swordsman');
  document.getElementById('cls-mg').classList.toggle('sel', cls === 'mage');
}

function createChar() {
  const name = document.getElementById('pname').value.trim();
  if (!name) { toast('請輸入角色名稱！'); return; }
  if (!selectedClass) { toast('請選擇職業！'); return; }
  newGame(name, selectedClass);
  startGame();
}

function continueGame() {
  if (loadGame()) startGame();
}

function startGame() {
  document.getElementById('title-scr').style.display = 'none';
  document.getElementById('cc-scr').style.display = 'none';
  document.getElementById('game-root').style.display = 'flex';
  render();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
(function init() {
  const hasSave = !!localStorage.getItem('star_rpg_v1');
  document.getElementById('continue-btn').style.display = hasSave ? 'block' : 'none';
})();
</script>
</body>
</html>
